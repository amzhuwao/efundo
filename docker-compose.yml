# Optional Docker services (Redis, MinIO)
# PostgreSQL runs natively on the host — see scripts/setup-postgres.sh

services:
  redis:
    image: redis:7-alpine
    container_name: efundo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: efundo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: efundo
      MINIO_ROOT_PASSWORD: efundominio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: efundo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 efundo efundominio;
      mc mb --ignore-existing local/efundo-resources;
      mc anonymous set download local/efundo-resources/public;
      exit 0;
      "

volumes:
  redis_data:
  minio_data:
